<!DOCTYPE html>
<html>
<head>
    <title>NodeJS AJAX Example</title>
</head>
<body>

    <h2>NodeJS AJAX Demo</h2>

    <button onclick="getHello()">Get Hello</button>

    <p id="result"></p>

    <script>
        function getHello() {
            fetch("/gethello")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("result").innerHTML = data;
                });
        }
    </script>

</body>
</html>
